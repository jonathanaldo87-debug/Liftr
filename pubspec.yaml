name: liftr
description: Workout logger app — track every rep.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  shared_preferences: ^2.2.0   # onboarding answers + "already seen it" flag
  geolocator: ^14.0.3              # GPS stream + permissions for tracked runs
  vibration: ^3.2.0                # haptic buzz when a target distance is hit
  wakelock_plus: ^1.6.1            # keep the screen on while a run is timing
  flutter_local_notifications: ^22.1.0  # persistent "run in progress" notification
  # Add later as needed:
  # provider: ^6.1.0          # State management
  # go_router: ^12.0.0        # Navigation
  # isar: ^3.1.0              # Local DB
  # fl_chart: ^0.65.0         # Richer charts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # Bundled, not fetched at runtime. This app is used in gym basements and on
  # roads with no signal, so a font that downloads on first launch would show
  # the wrong one exactly when it matters. Both families are OFL — licences are
  # in assets/fonts/ alongside the files.
  #
  # DM Sans upstream is now a single variable font. These are static instances
  # of the wght axis instead, because the app styles text with `fontWeight:` in
  # roughly a hundred places, and a variable file would need every one of them
  # rewritten as `fontVariations:` to render at the right weight.
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-400.ttf
          weight: 400
        - asset: assets/fonts/DMSans-500.ttf
          weight: 500
        - asset: assets/fonts/DMSans-600.ttf
          weight: 600
    - family: DMSerifDisplay
      fonts:
        - asset: assets/fonts/DMSerifDisplay-Regular.ttf
          weight: 400
