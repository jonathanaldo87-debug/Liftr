name: liftr
description: Workout logger app — track every rep.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.0.0
  shared_preferences: ^2.2.0   # onboarding answers + "already seen it" flag
  # Add later as needed:
  # provider: ^6.1.0          # State management
  # go_router: ^12.0.0        # Navigation
  # isar: ^3.1.0              # Local DB
  # fl_chart: ^0.65.0         # Richer charts

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  # To enable custom fonts, download from Google Fonts and place in assets/fonts/:
  # https://fonts.google.com/specimen/DM+Sans
  # https://fonts.google.com/specimen/DM+Serif+Display
  # Then uncomment the section below:
  # fonts:
  #   - family: DMSans
  #     fonts:
  #       - asset: assets/fonts/DMSans-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/DMSans-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/DMSans-SemiBold.ttf
  #         weight: 600
  #   - family: DMSerifDisplay
  #     fonts:
  #       - asset: assets/fonts/DMSerifDisplay-Regular.ttf
  #         weight: 400
  #       - asset: assets/fonts/DMSerifDisplay-Italic.ttf
  #         weight: 400
  #         style: italic
